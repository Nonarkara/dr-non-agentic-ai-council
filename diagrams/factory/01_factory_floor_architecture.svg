<text x="152" y="255" class="label">⚡</text>
<text x="200" y="255" class="label">TRIGGER</text>
<text x="154" y="292" text-anchor="start" class="small">User request: “Podcast ep019 on AI</text>
<text x="154" y="319" text-anchor="start" class="small">regulation.”</text><rect x="130" y="460" width="560" height="210" rx="20" class="box"/>
<text x="152" y="505" class="label">🚦</text>
<text x="200" y="505" class="label">ROUTER AGENT</text>
<text x="154" y="542" text-anchor="start" class="small">Lightweight classifier. Binary GO /</text>
<text x="154" y="569" text-anchor="start" class="small">BLOCK. Checks task type, cost,</text>
<text x="154" y="596" text-anchor="start" class="small">cached voice, and missing keys.</text><rect x="130" y="740" width="560" height="180" rx="20" class="box"/>
<text x="152" y="785" class="label">▣</text>
<text x="200" y="785" class="label">BLACKBOARD</text>
<text x="154" y="822" text-anchor="start" class="small">Shared JSON state: task_id, status,</text>
<text x="154" y="849" text-anchor="start" class="small">artifacts, errors, cost tracker. No</text>
