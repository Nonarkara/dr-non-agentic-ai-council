    <linearGradient id="gold" x1="0" x2="1">
      <stop offset="0%" stop-color="#ffe082"/>
      <stop offset="100%" stop-color="#ffb000"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3.5" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft"><feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#15d9ff" flood-opacity="0.32"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 z" fill="#7cf8ff"/>
    </marker>
    <marker id="arrowGold" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 z" fill="#ffd15c"/>
    </marker>
    <style>
      .title { font-family: Arial Black, Impact, sans-serif; font-size: 60px; fill: #f7fbff; letter-spacing: .5px; }
      .subtitle { font-family: Arial, sans-serif; font-size: 27px; fill: #ffd15c; font-weight: 700; }
      .label { font-family: Arial, sans-serif; font-size: 26px; fill: #f4fbff; font-weight: 800; }
      .small { font-family: Arial, sans-serif; font-size: 20px; fill: #c7e8f2; }
      .tiny { font-family: Arial, sans-serif; font-size: 16px; fill: #9bd8e9; }
      .gold { fill: #ffd15c; }
      .teal { fill: #7cf8ff; }
      .muted { fill: #83a6b7; }
      .panel { fill: url(#panel); stroke: #16dfff; stroke-width: 3; filter: url(#soft); }
      .panelGold { fill: #101720; stroke: #ffd15c; stroke-width: 3; filter: url(#soft); }
      .box { fill: #0d1d2c; stroke: #70f7ff; stroke-width: 2.5; rx: 18; }
      .boxGold { fill: #151714; stroke: #ffd15c; stroke-width: 2.5; rx: 18; }
      .flow { stroke: #7cf8ff; stroke-width: 5; fill: none; marker-end: url(#arrow); filter:url(#glow); }
      .flowGold { stroke: #ffd15c; stroke-width: 5; fill: none; marker-end: url(#arrowGold); filter:url(#glow); }
      .code { font-family: Menlo, Consolas, monospace; font-size: 18px; fill: #19e7ff; }
    </style>
  </defs>
