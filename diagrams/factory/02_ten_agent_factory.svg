  <text x="960.0" y="95" text-anchor="middle" class="title">The 10-Agent Factory</text>
  <text x="960.0" y="133" text-anchor="middle" class="subtitle">Each worker owns one job, one schema, one failure mode</text>
<rect x="95" y="210" width="315" height="165" rx="20" class="box"/>
<text x="119" y="255" class="label">Router</text>
<text x="119" y="292" text-anchor="start" class="small">Traffic cop. No</text>
<text x="119" y="319" text-anchor="start" class="small">creativity. GO /</text>
<text x="119" y="346" text-anchor="start" class="small">BLOCK. Model/tool:</text>
<text x="119" y="373" text-anchor="start" class="small">GPT-4o-mini</text><circle cx="380" cy="245" r="23" fill="#0a3249" stroke="#ffd15c" stroke-width="3"/><text x="380" y="253" text-anchor="middle" class="small">1</text><rect x="455" y="210" width="315" height="165" rx="20" class="box"/>
<text x="479" y="255" class="label">Research</text>
<text x="479" y="292" text-anchor="start" class="small">Parallel fact</text>
<text x="479" y="319" text-anchor="start" class="small">fetcher. Structured</text>
<text x="479" y="346" text-anchor="start" class="small">claims only.</text>
<text x="479" y="373" text-anchor="start" class="small">Model/tool: Search /</text>
<text x="479" y="400" text-anchor="start" class="small">Perplexity</text><circle cx="740" cy="245" r="23" fill="#0a3249" stroke="#ffd15c" stroke-width="3"/><text x="740" y="253" text-anchor="middle" class="small">2</text><rect x="815" y="210" width="315" height="165" rx="20" class="box"/>
<text x="839" y="255" class="label">Script Factory</text>
<text x="839" y="292" text-anchor="start" class="small">Segments with voice</text>
<text x="839" y="319" text-anchor="start" class="small">tags and production</text>
<text x="839" y="346" text-anchor="start" class="small">markers. Model/tool:</text>
<text x="839" y="373" text-anchor="start" class="small">GPT-4o / Claude</text><circle cx="1100" cy="245" r="23" fill="#0a3249" stroke="#ffd15c" stroke-width="3"/><text x="1100" y="253" text-anchor="middle" class="small">3</text><rect x="1175" y="210" width="315" height="165" rx="20" class="box"/>
<text x="1199" y="255" class="label">Voice Synth</text>
<text x="1199" y="292" text-anchor="start" class="small">Direct ElevenLabs</text>
<text x="1199" y="319" text-anchor="start" class="small">executor with</text>
<text x="1199" y="346" text-anchor="start" class="small">retries. Model/tool:</text>
<text x="1199" y="373" text-anchor="start" class="small">Python / API</text><circle cx="1460" cy="245" r="23" fill="#0a3249" stroke="#ffd15c" stroke-width="3"/><text x="1460" y="253" text-anchor="middle" class="small">4</text><rect x="1535" y="210" width="315" height="165" rx="20" class="box"/>
<text x="1559" y="255" class="label">Visual Director</text>
<text x="1559" y="292" text-anchor="start" class="small">Scene prompts and</text>
<text x="1559" y="319" text-anchor="start" class="small">motion parameters.</text>
<text x="1559" y="346" text-anchor="start" class="small">Model/tool: GPT-4o +</text>
<text x="1559" y="373" text-anchor="start" class="small">video API</text><circle cx="1820" cy="245" r="23" fill="#0a3249" stroke="#ffd15c" stroke-width="3"/><text x="1820" y="253" text-anchor="middle" class="small">5</text><rect x="95" y="450" width="315" height="165" rx="20" class="box"/>
<text x="119" y="495" class="label">Video Renderer</text>
<text x="119" y="532" text-anchor="start" class="small">FFmpeg stitching,</text>
<text x="119" y="559" text-anchor="start" class="small">subtitles, graceful</text>
<text x="119" y="586" text-anchor="start" class="small">fallback.</text>
<text x="119" y="613" text-anchor="start" class="small">Model/tool: FFmpeg /</text>
<text x="119" y="640" text-anchor="start" class="small">API</text><circle cx="380" cy="485" r="23" fill="#0a3249" stroke="#ffd15c" stroke-width="3"/><text x="380" y="493" text-anchor="middle" class="small">6</text><rect x="455" y="450" width="315" height="165" rx="20" class="box"/>
<text x="479" y="495" class="label">Assets</text>
<text x="479" y="532" text-anchor="start" class="small">Cover art, cards,</text>
<text x="479" y="559" text-anchor="start" class="small">thumbnails, waveform</text>
<text x="479" y="586" text-anchor="start" class="small">assets. Model/tool:</text>
<text x="479" y="613" text-anchor="start" class="small">Image API</text><circle cx="740" cy="485" r="23" fill="#0a3249" stroke="#ffd15c" stroke-width="3"/><text x="740" y="493" text-anchor="middle" class="small">7</text><rect x="815" y="450" width="315" height="165" rx="20" class="box"/>
<text x="839" y="495" class="label">Integration</text>
<text x="839" y="532" text-anchor="start" class="small">Assembly line: tags,</text>
<text x="839" y="559" text-anchor="start" class="small">RSS, upload, URL.</text>
<text x="839" y="586" text-anchor="start" class="small">Model/tool: Python /</text>
<text x="839" y="613" text-anchor="start" class="small">Node</text><circle cx="1100" cy="485" r="23" fill="#0a3249" stroke="#ffd15c" stroke-width="3"/><text x="1100" y="493" text-anchor="middle" class="small">8</text><rect x="1175" y="450" width="315" height="165" rx="20" class="box"/>
<text x="1199" y="495" class="label">QA</text>
<text x="1199" y="532" text-anchor="start" class="small">Post-shipment audit.</text>
<text x="1199" y="559" text-anchor="start" class="small">Does not block.</text>
<text x="1199" y="586" text-anchor="start" class="small">Model/tool:</text>
<text x="1199" y="613" text-anchor="start" class="small">GPT-4o-mini</text><circle cx="1460" cy="485" r="23" fill="#0a3249" stroke="#ffd15c" stroke-width="3"/><text x="1460" y="493" text-anchor="middle" class="small">9</text><rect x="1535" y="450" width="315" height="165" rx="20" class="box"/>
<text x="1559" y="495" class="label">Analytics</text>
<text x="1559" y="532" text-anchor="start" class="small">Performance feedback</text>
<text x="1559" y="559" text-anchor="start" class="small">back into Router.</text>
<text x="1559" y="586" text-anchor="start" class="small">Model/tool:</text>
<text x="1559" y="613" text-anchor="start" class="small">Lightweight</text><circle cx="1820" cy="485" r="23" fill="#0a3249" stroke="#ffd15c" stroke-width="3"/><text x="1820" y="493" text-anchor="middle" class="small">10</text><path d="M410,292 L455,292" class="flow"/><path d="M770,292 L815,292" class="flow"/><path d="M1130,292 L1175,292" class="flow"/><path d="M1490,292 L1535,292" class="flow"/><path d="M410,532 L455,532" class="flow"/><path d="M770,532 L815,532" class="flow"/><path d="M1130,532 L1175,532" class="flow"/><path d="M1490,532 L1535,532" class="flow"/><rect x="380" y="880" width="1160" height="80" rx="40" fill="#101720" stroke="#ffd15c" stroke-width="3" filter="url(#soft)"/><text x="960.0" y="929.0" text-anchor="middle" class="label"> Not a debating society. A production line with named workers and strict interfaces. </text></svg>