  </g>
  <rect x="45" y="38" width="1830" height="116" rx="28" fill="#071220" stroke="#19e7ff" stroke-width="3" filter="url(#soft)"/>
  <text x="960.0" y="95" text-anchor="middle" class="title">Three-Week Migration Roadmap</text>
  <text x="960.0" y="133" text-anchor="middle" class="subtitle">Turn the council into a shipping machine</text>
<circle cx="360" cy="300" r="82" fill="#0b2437" stroke="#ffd15c" stroke-width="5" filter="url(#soft)"/><text x="360" y="292" text-anchor="middle" class="label">Week 1</text><text x="360" y="327" text-anchor="middle" class="small">ship faster</text><rect x="150" y="440" width="420" height="310" rx="20" class="boxGold"/>
<text x="174" y="485" class="label">Fix Audio Pipeline</text>
<text x="174" y="522" text-anchor="start" class="small">Delete pending approvals.</text>
<text x="174" y="549" text-anchor="start" class="small">Give Voice Synthesizer</text>
<text x="174" y="576" text-anchor="start" class="small">direct ElevenLabs access.</text>
<text x="174" y="603" text-anchor="start" class="small">Implement blackboard.</text>
<text x="174" y="630" text-anchor="start" class="small">Scripts stop piling up.</text><path d="M570,595 C 655.0,595 655.0,595 740,595" class="flow"/><circle cx="950" cy="300" r="82" fill="#0b2437" stroke="#ffd15c" stroke-width="5" filter="url(#soft)"/><text x="950" y="292" text-anchor="middle" class="label">Week 2</text><text x="950" y="327" text-anchor="middle" class="small">ship faster</text><rect x="740" y="440" width="420" height="310" rx="20" class="box"/>
<text x="764" y="485" class="label">Add Video Pipeline</text>
<text x="764" y="522" text-anchor="start" class="small">Add Visual Director and</text>
<text x="764" y="549" text-anchor="start" class="small">Renderer. Connect</text>
<text x="764" y="576" text-anchor="start" class="small">Runway/Kling. Build FFmpeg</text>
<text x="764" y="603" text-anchor="start" class="small">assembly. First MP4 ships.</text><path d="M1160,595 C 1245.0,595 1245.0,595 1330,595" class="flow"/><circle cx="1540" cy="300" r="82" fill="#0b2437" stroke="#ffd15c" stroke-width="5" filter="url(#soft)"/><text x="1540" y="292" text-anchor="middle" class="label">Week 3</text><text x="1540" y="327" text-anchor="middle" class="small">ship faster</text><rect x="1330" y="440" width="420" height="310" rx="20" class="box"/>
<text x="1354" y="485" class="label">Add Feedback Loop</text>
<text x="1354" y="522" text-anchor="start" class="small">Analytics reads</text>
<text x="1354" y="549" text-anchor="start" class="small">performance. Router</text>
<text x="1354" y="576" text-anchor="start" class="small">adjusts topic, length,</text>
<text x="1354" y="603" text-anchor="start" class="small">voice, cost thresholds.</text>
<text x="1354" y="630" text-anchor="start" class="small">System learns what ships</text>
<text x="1354" y="657" text-anchor="start" class="small">well.</text><rect x="390" y="840" width="1140" height="85" rx="42" fill="#101720" stroke="#ffd15c" stroke-width="3" filter="url(#soft)"/><text x="960.0" y="891.5" text-anchor="middle" class="label"> Stop building approval queues. Build direct execution rights. </text></svg>